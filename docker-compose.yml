---
services:
  techmaturity:
    build: .
    ports:
      - "8080:3000"
    environment:
      - RAILS_ENV=development
      - DB_HOST=db
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - DB_NAME=techmaturitydb
    # Optional .env supplies secrets like OR_DELPHI_API_KEY (OpenRouter) for AI
    # repo analysis. Not committed; the app degrades to file detectors without it.
    env_file:
      - path: .env
        required: false
    depends_on: ["db"]
  db:
    image: postgres:11.7-alpine
    environment:
      - POSTGRES_DB=techmaturitydb
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
