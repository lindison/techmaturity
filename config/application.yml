default: &default
  enable_asset_creation: true
  enable_first_time_user_exp: true
  enable_tag_modification: true
  feedback_slack:
    endpoint: "#endpoint"
    channel_name: "#channel_name"

development:
  enable_asset_creation: true
  enable_first_time_user_exp: true
  enable_tag_modification: true
  <<: *default

test:
  # Merge defaults first, then override below (Psych gives the later value
  # precedence, so an override must come AFTER the `<<` merge).
  <<: *default
  enable_asset_creation: true
  enable_tag_modification: true
  # Disabled so the onboarding modal doesn't overlay/intercept clicks in system tests.
  enable_first_time_user_exp: false

production:
  enable_asset_creation: true
  enable_first_time_user_exp: true
  enable_tag_modification: true
  feedback_slack:
    endpoint: "https://hooks.slack.com/services/xxx" #put your slack token here upon deployment - don't put slack tokens in public repos ;)
    channel_name: "#techmaturity"
